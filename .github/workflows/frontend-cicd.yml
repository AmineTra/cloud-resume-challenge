name: Deploy Frontend Website

# 1. TRIGGER: Run this workflow whenever someone pushes code to the 'main' branch
on:
  push:
    branches:
      - main
    paths:
      - 'Frontend/**' # Only run if something inside the 'Frontend' folder changed

# 2. JOBS: The actual work to do
jobs:
  deploy:
    runs-on: ubuntu-latest  # Run on a virtual Linux machine provided by GitHub

    steps:
      # Step A: Download your code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step B: Log in to AWS (Using Secrets you add later)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step C: Upload Frontend files to S3
      - name: Sync Frontend to S3
        run: |
          aws s3 sync ./Frontend s3://aminetraibi.com --delete

      # Step D: Clear the CloudFront Cache (So users see the update)
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"